version: "3.8"

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=aiseek
      - POSTGRES_PASSWORD=aiseek_password
      - POSTGRES_DB=aiseek_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiseek -d aiseek_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: gunicorn app.main:app -k uvicorn.workers.UvicornWorker -w 4 -b 0.0.0.0:5000 --timeout 45 --graceful-timeout 15 --keep-alive 5
    environment:
      - DATABASE_URL=postgresql://aiseek:aiseek_password@db:5432/aiseek_db
      - READ_DATABASE_URL=postgresql://aiseek:aiseek_password@db:5432/aiseek_db
      - DB_POOL_SIZE=30
      - DB_MAX_OVERFLOW=60
      - DB_POOL_TIMEOUT_SEC=30
      - DB_POOL_RECYCLE_SEC=1800
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - WORKER_SECRET=m3pro_worker_2026
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  backend2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: gunicorn app.main:app -k uvicorn.workers.UvicornWorker -w 4 -b 0.0.0.0:5000 --timeout 45 --graceful-timeout 15 --keep-alive 5
    environment:
      - DATABASE_URL=postgresql://aiseek:aiseek_password@db:5432/aiseek_db
      - READ_DATABASE_URL=postgresql://aiseek:aiseek_password@db:5432/aiseek_db
      - DB_POOL_SIZE=30
      - DB_MAX_OVERFLOW=60
      - DB_POOL_TIMEOUT_SEC=30
      - DB_POOL_RECYCLE_SEC=1800
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - WORKER_SECRET=m3pro_worker_2026
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  backend3:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: gunicorn app.main:app -k uvicorn.workers.UvicornWorker -w 4 -b 0.0.0.0:5000 --timeout 45 --graceful-timeout 15 --keep-alive 5
    environment:
      - DATABASE_URL=postgresql://aiseek:aiseek_password@db:5432/aiseek_db
      - READ_DATABASE_URL=postgresql://aiseek:aiseek_password@db:5432/aiseek_db
      - DB_POOL_SIZE=30
      - DB_MAX_OVERFLOW=60
      - DB_POOL_TIMEOUT_SEC=30
      - DB_POOL_RECYCLE_SEC=1800
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - WORKER_SECRET=m3pro_worker_2026
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  backend_celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=postgresql://aiseek:aiseek_password@db:5432/aiseek_db
      - READ_DATABASE_URL=postgresql://aiseek:aiseek_password@db:5432/aiseek_db
      - DB_POOL_SIZE=10
      - DB_MAX_OVERFLOW=20
      - DB_POOL_TIMEOUT_SEC=30
      - DB_POOL_RECYCLE_SEC=1800
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=2
    environment:
      - DATABASE_URL=postgresql://aiseek:aiseek_password@db:5432/aiseek_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "5001:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend1
      - backend2
      - backend3

volumes:
  postgres_data:

