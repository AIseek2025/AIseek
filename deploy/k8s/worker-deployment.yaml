apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiseek-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aiseek-worker
  template:
    metadata:
      labels:
        app: aiseek-worker
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: worker
          image: aiseek-worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: aiseek-backend-config
            - secretRef:
                name: aiseek-backend-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "1024Mi"
            limits:
              cpu: "4000m"
              memory: "8192Mi"
          command: ["celery"]
          args:
            - "-A"
            - "app.worker.celery_app"
            - "worker"
            - "--loglevel=info"
            - "--concurrency=2"
