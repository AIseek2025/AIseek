apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aiseek-backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aiseek-backend
  minReplicas: 3
  maxReplicas: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
