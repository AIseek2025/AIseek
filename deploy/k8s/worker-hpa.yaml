apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aiseek-worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aiseek-worker
  minReplicas: 1
  maxReplicas: 30
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
