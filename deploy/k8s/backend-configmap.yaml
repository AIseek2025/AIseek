apiVersion: v1
kind: ConfigMap
metadata:
  name: aiseek-backend-config
data:
  AUTO_MIGRATE: "1"
  READINESS_STRICT: "1"
  DB_POOL_SIZE: "30"
  DB_MAX_OVERFLOW: "60"
  DB_POOL_TIMEOUT_SEC: "30"
  DB_POOL_RECYCLE_SEC: "1800"
  REDIS_SOCKET_TIMEOUT_SEC: "0.6"
  REDIS_CONNECT_TIMEOUT_SEC: "0.3"
  REDIS_MAX_CONNECTIONS: "500"
  ES_REQUEST_TIMEOUT_SEC: "1.6"
  ES_MAX_RETRIES: "1"
  ES_RETRY_ON_TIMEOUT: "true"
  WRITE_GUARD_ENABLED: "true"
  IDEMPOTENCY_ENABLED: "true"
