worker_processes auto;

events {
    worker_connections 4096;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    resolver 127.0.0.11 valid=5s;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    map $http_x_request_id $aiseek_request_id {
        default $http_x_request_id;
        "" $request_id;
    }

    limit_req_zone $binary_remote_addr zone=aiseek_api_rps:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=aiseek_auth_rps:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=aiseek_search_rps:10m rate=15r/s;

    upstream aiseek_backend {
        server backend:5000;
        keepalive 256;
    }

    server {
        listen 80;

        client_max_body_size 64m;

        add_header X-Request-Id $aiseek_request_id always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy same-origin always;
        add_header X-Frame-Options DENY always;

        # Health check endpoint
        location /healthz {
            access_log off;
            return 200 "OK";
        }


        location ^~ /static/dist/manifest {
            alias /srv/aiseek/static/dist/manifest;
            add_header Cache-Control "no-store, max-age=0" always;
            try_files $uri =404;
        }

        location ^~ /static/dist/r/ {
            alias /srv/aiseek/static/dist/r/;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            try_files $uri =404;
        }

        location ^~ /static/uploads/ {
            alias /srv/aiseek/static/uploads/;
            add_header Cache-Control "public, max-age=3600" always;
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods 'GET, OPTIONS' always;
            try_files $uri =404;
        }

        location ^~ /static/worker_media/ {
            alias /srv/aiseek/static/worker_media/;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods 'GET, OPTIONS' always;
            add_header Access-Control-Expose-Headers 'Content-Length,Content-Range' always;
            try_files $uri =404;
        }

        location ^~ /static/js/ {
            alias /srv/aiseek/static/js/;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            try_files $uri =404;
        }

        location ^~ /static/css/ {
            alias /srv/aiseek/static/css/;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            try_files $uri =404;
        }

        location ^~ /static/ {
            alias /srv/aiseek/static/;
            add_header Cache-Control "public, max-age=86400" always;
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods 'GET, OPTIONS' always;
            try_files $uri =404;
        }

        location ~ ^/api/v1/ai/jobs/[^/]+/events/stream$ {
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Request-Id $aiseek_request_id;
            proxy_set_header X-Session-Id $http_x_session_id;
            proxy_set_header X-Canary $http_x_canary;
            
            # SSE optimizations
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            
            proxy_pass http://aiseek_backend;
        }

        location /api/ {
            limit_req zone=aiseek_api_rps burst=60 nodelay;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Request-Id $aiseek_request_id;
            proxy_set_header X-Session-Id $http_x_session_id;
            proxy_set_header X-Canary $http_x_canary;
            proxy_read_timeout 70s;
            proxy_send_timeout 70s;
            proxy_connect_timeout 3s;
            proxy_pass http://aiseek_backend;
        }

        location ^~ /api/v1/auth/ {
            limit_req zone=aiseek_auth_rps burst=20 nodelay;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Request-Id $aiseek_request_id;
            proxy_set_header X-Session-Id $http_x_session_id;
            proxy_set_header X-Canary $http_x_canary;
            proxy_read_timeout 70s;
            proxy_send_timeout 70s;
            proxy_connect_timeout 3s;
            proxy_pass http://aiseek_backend;
        }

        location = /api/v1/posts/search {
            limit_req zone=aiseek_search_rps burst=40 nodelay;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Request-Id $aiseek_request_id;
            proxy_set_header X-Session-Id $http_x_session_id;
            proxy_set_header X-Canary $http_x_canary;
            proxy_read_timeout 70s;
            proxy_send_timeout 70s;
            proxy_connect_timeout 3s;
            proxy_pass http://aiseek_backend;
        }

        location = /api/v1/users/search-user {
            limit_req zone=aiseek_search_rps burst=40 nodelay;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Request-Id $aiseek_request_id;
            proxy_set_header X-Session-Id $http_x_session_id;
            proxy_set_header X-Canary $http_x_canary;
            proxy_read_timeout 70s;
            proxy_send_timeout 70s;
            proxy_connect_timeout 3s;
            proxy_pass http://aiseek_backend;
        }

        location / {
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Request-Id $aiseek_request_id;
            proxy_set_header X-Session-Id $http_x_session_id;
            proxy_set_header X-Canary $http_x_canary;
            proxy_read_timeout 70s;
            proxy_send_timeout 70s;
            proxy_connect_timeout 3s;
            proxy_pass http://aiseek_backend;
        }
    }
}
