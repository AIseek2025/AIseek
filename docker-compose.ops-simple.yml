version: "3.8"

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=aiseek
      - POSTGRES_PASSWORD=aiseek_password
      - POSTGRES_DB=aiseek_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiseek -d aiseek_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: gunicorn app.main:app -k uvicorn.workers.UvicornWorker -w 2 -b 0.0.0.0:5000 --timeout 45 --graceful-timeout 15 --keep-alive 5
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://aiseek:aiseek_password@db:5432/aiseek_db
      - READ_DATABASE_URL=postgresql://aiseek:aiseek_password@db:5432/aiseek_db
      - DB_POOL_SIZE=20
      - DB_MAX_OVERFLOW=40
      - DB_POOL_TIMEOUT_SEC=30
      - DB_POOL_RECYCLE_SEC=1800
      - REDIS_URL=redis://redis:6379/0
      - REDIS_SOCKET_TIMEOUT_SEC=0.6
      - REDIS_CONNECT_TIMEOUT_SEC=0.3
      - REDIS_MAX_CONNECTIONS=300
      - WORKER_SECRET=m3pro_worker_2026
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "5001:80"
    volumes:
      - ./deploy/nginx/simple.conf:/etc/nginx/nginx.conf:ro
      - ./backend/static:/srv/aiseek/static:ro
    depends_on:
      - backend

volumes:
  postgres_data:
