<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="aiseek-build" content="{{ build_id }}">
    <link rel="icon" href="/static/img/logo.svg" type="image/svg+xml">
    <title>AI创作工作台 - AIseek</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body, body * { -webkit-user-select: text !important; user-select: text !important; }
        button, .btn, [role="button"], .status-pill, .drag-handle { -webkit-user-select: none !important; user-select: none !important; }
        :root {
            --bg: #161823;
            --surface: #1a1f2e;
            --text: #f0f4f8;
            --muted: rgba(240,244,248,0.65);
            --muted2: rgba(240,244,248,0.45);
            --stroke: rgba(255,255,255,0.10);
            --primary: #00d4aa;
            --primary-hover: #00e6b8;
            --r-sm: 8px;
            --r-md: 12px;
            --s-1: 8px;
            --s-2: 14px;
            --s-3: 20px;
            --dur: 160ms;
            --good: #4ade80;
            --warn: #fbbf24;
            --bad: #f87171;
        }
        body[data-theme="light"] {
            --bg: #f0f2f5;
            --surface: #ffffff;
            --text: #0f172a;
            --muted: rgba(15,23,42,0.65);
            --muted2: rgba(15,23,42,0.45);
            --stroke: rgba(15,23,42,0.12);
            --primary: #0d9488;
            --primary-hover: #0f766e;
        }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background: var(--bg); color: var(--text); }
        a { color: inherit; text-decoration: none; }
        .topbar { height: 52px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: var(--bg); border-bottom: 1px solid var(--stroke); position: sticky; top: 0; z-index: 20; }
        .topbar .row { flex-wrap: nowrap; gap: 8px; align-items: center; }
        .brand { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 14px; }
        .brand .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--primary); }
        .pill { display: inline-flex; align-items: center; gap: var(--s-1); padding: 6px 12px; border-radius: var(--r-sm); background: var(--bg); border: 1px solid var(--stroke); font-size: 13px; transition: all var(--dur) ease; }
        .pill:hover { border-color: var(--primary); color: var(--primary); }
        .btn { display: inline-flex; align-items: center; gap: var(--s-1); border: 1px solid var(--stroke); cursor: pointer; border-radius: var(--r-sm); height: 34px; padding: 0 12px; background: var(--bg); color: var(--text); font-size: 13px; font-weight: 600; transition: all var(--dur) ease; }
        .btn:hover { border-color: var(--primary); color: var(--primary); }
        .btn-primary { background: var(--primary); border-color: var(--primary); color: #0a0e14; }
        .btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
        .btn-danger { border-color: rgba(248,113,113,0.5); color: var(--bad); }
        .btn-small { height: 30px; padding: 0 10px; font-size: 12px; }
        .layout { padding: var(--s-2); min-height: calc(100vh - 54px); }
        .workspace-board { display: flex; flex-wrap: wrap; gap: var(--s-2); align-items: flex-start; align-content: flex-start; }
        .ws-module { width: 520px; min-width: 460px; max-width: 600px; background: var(--surface); border: 1px solid var(--stroke); border-radius: var(--r-md); overflow: hidden; display: flex; flex-direction: column; min-height: 320px; cursor: move; transition: box-shadow var(--dur) ease; }
        .ws-module:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
        .ws-module.dragging { opacity: 0.7; cursor: grabbing; }
        .ws-module .module-h { padding: 0 14px; height: 40px; display: flex; align-items: center; justify-content: space-between; background: var(--bg); border-bottom: 1px solid var(--stroke); cursor: grab; }
        .ws-module .module-h:active { cursor: grabbing; }
        .ws-module .module-h .title { font-size: 13px; font-weight: 700; color: var(--text); }
        .ws-module .module-b { padding: var(--s-2); overflow: visible; flex: 1; min-height: 0; }
        .ws-module .module-b::-webkit-scrollbar { width: 6px; }
        .ws-module .module-b::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
        .field { margin-bottom: var(--s-2); }
        .field label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 4px; }
        .input, .select, .textarea { width: 100%; background: var(--bg); border: 1px solid var(--stroke); color: var(--text); border-radius: var(--r-sm); padding: 10px 12px; font-size: 13px; outline: none; transition: border-color var(--dur) ease; }
        .input:focus, .select:focus, .textarea:focus { border-color: var(--primary); }
        .input::placeholder, .textarea::placeholder { color: var(--muted2); }
        .select { cursor: pointer; }
        .textarea { min-height: 120px; resize: vertical; }
        .row { display: flex; gap: var(--s-1); align-items: center; flex-wrap: wrap; }
        .grow { flex: 1; min-width: 0; }
        .form-grid-two { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .form-grid-three { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .inline-ctl { display: flex; align-items: center; gap: 8px; }
        .inline-ctl .name { font-size: 12px; color: var(--muted); min-width: 56px; }
        .inline-ctl .select { flex: 1; min-width: 0; }
        .section-label { font-size: 12px; font-weight: 700; color: var(--primary); margin: var(--s-2) 0 var(--s-1); padding-bottom: 6px; border-bottom: 1px solid var(--stroke); }
        .section-toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 8px 0; font-size: 13px; color: var(--muted); }
        .section-toggle:hover { color: var(--text); }
        .section-toggle i { transition: transform var(--dur) ease; }
        .section-toggle.collapsed i { transform: rotate(-90deg); }
        .section-optional { margin-top: var(--s-1); }
        .section-optional.collapsed { display: none; }
        .badge { font-size: 11px; padding: 3px 8px; border-radius: 999px; border: 1px solid var(--stroke); color: var(--muted); }
        .badge.good { color: var(--good); }
        .badge.warn { color: var(--warn); }
        .badge.bad { color: var(--bad); }
        .status-pill { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); border: 1px solid var(--stroke); border-radius: 999px; height: 24px; padding: 0 10px; }
        .status-pill::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
        .status-pill.good { color: var(--good); }
        .status-pill.warn { color: var(--warn); }
        .status-pill.bad { color: var(--bad); }
        .tabs { display: flex; gap: 4px; }
        .tab { cursor: pointer; padding: 6px 10px; border-radius: var(--r-sm); border: 1px solid var(--stroke); color: var(--muted); font-size: 12px; transition: all var(--dur) ease; }
        .tab:hover { color: var(--text); }
        .tab.active { background: var(--primary); border-color: var(--primary); color: #0a0e14; }
        body[data-theme="light"] .tab.active { color: #fff; }
        .list { display: flex; flex-direction: column; gap: 10px; }
        .card { padding: var(--s-2); border-radius: var(--r-sm); border: 1px solid transparent; cursor: pointer; transition: border-color var(--dur) ease; }
        .card.active { border: 1px solid var(--primary); }
        .kv { display: grid; grid-template-columns: 80px 1fr; gap: 6px 10px; font-size: 12px; }
        .kv .k { color: var(--muted2); }
        .kv .v { color: var(--text); word-break: break-all; }
        .msg { padding: 10px; border-radius: var(--r-sm); border: 1px solid var(--stroke); margin-bottom: 8px; }
        .msg.user { border-color: rgba(0,212,170,0.3); }
        .msg .r { font-size: 11px; color: var(--muted2); margin-bottom: 4px; }
        .msg .c { font-size: 13px; line-height: 1.5; white-space: pre-wrap; }
        .chat-log { max-height: 320px; overflow-y: auto; margin-bottom: 10px; }
        .chat-input { display: flex; gap: 10px; }
        .chat-input textarea { flex: 1; min-height: 80px; resize: vertical; }
        #mod-works .module-b { max-height: 480px; overflow-y: auto; }
        #mod-works .module-b.has-more { overflow-y: scroll; }
        .video { width: 100%; aspect-ratio: 16/9; border-radius: var(--r-sm); background: #000; object-fit: contain; }
        .toast { position: fixed; right: 16px; bottom: 16px; background: rgba(0,0,0,0.8); color: #fff; border-radius: var(--r-sm); padding: 10px 14px; max-width: 360px; display: none; z-index: 99; }
        .toast.show { display: block; }
        #mod-create { min-height: 420px; }
        #btnLoadMorePosts { display: none !important; }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="row">
            <a class="pill" href="/"><i class="fas fa-arrow-left"></i><span>首页</span></a>
            <div class="brand"><span class="dot"></span><span>AI创作工作台</span></div>
            <span class="muted2" id="buildTag">{{ build_id }}</span>
        </div>
        <div class="row">
            <button class="btn btn-small" id="btnTheme" title="切换深色/浅色"><i class="fas fa-circle-half-stroke"></i><span id="themeLabel">深色</span></button>
        </div>
    </div>

    <div class="layout">
        <div class="workspace-board" id="workspaceBoard">
            <section class="ws-module" id="mod-create" data-module="create">
            <div class="module-h"><div class="title">1. 新建AI视频任务</div><span class="drag-handle"><i class="fas fa-grip-vertical"></i></span></div>
            <div class="module-b">
                <div id="loginBox" class="card">
                    <div style="font-weight:700; margin-bottom:14px;">登录工作台</div>
                    <div class="field"><label>用户名</label><input class="input" id="loginUser" placeholder="admin / testuser / demo"></div>
                    <div class="field"><label>密码</label><input class="input" id="loginPass" type="password" placeholder="admin123 / test123 / demo123"></div>
                    <div class="row" style="margin-top:12px;"><button class="btn btn-primary grow" id="btnLogin"><i class="fas fa-right-to-bracket"></i>登录</button></div>
                </div>
                <div id="createBox" style="display:none;">
                    <div class="row" style="justify-content:flex-end; margin-bottom:6px;"><span class="badge warn" id="cooldownBadge" style="display:none;"><i class="fas fa-clock"></i> 冷却中</span></div>
                    <div class="section-label">必填项</div>
                    <div class="field"><label>用户文稿（将转为口播稿/脚本）</label><textarea class="textarea" id="inContent" placeholder="粘贴你的长文稿或要点，支持多段文本..."></textarea></div>
                    <div class="section-label">选填项（AI自动生成）</div>
                    <div class="section-toggle" id="toggleOptional"><i class="fas fa-chevron-down"></i><span>展开/收起选填项</span></div>
                    <div class="section-optional" id="optionalFields">
                        <div class="field"><label>标题</label><input class="input" id="inTitle" placeholder="例如：5分钟搞懂 RAG 与 Agent"></div>
                        <div class="field"><label>标签</label><input class="input" id="inTags" placeholder="多个标签用空格/逗号分隔"></div>
                        <div class="form-grid-two">
                            <div class="field"><label>分类</label><select class="select" id="inCategory"></select></div>
                            <div class="field"><label>口播风格</label><select class="select" id="inVoice"><option value="premium_female">高拟真女声（中文）</option><option value="premium_male">高拟真男声（中文）</option><option value="premium_news">专业播报（中文）</option><option value="premium_en">高拟真女声（EN）</option></select></div>
                        </div>
                        <div class="form-grid-two">
                            <div class="field"><label>BGM 氛围</label><select class="select" id="inBgm"><option value="">默认</option><option value="none">无BGM</option><option value="tech">科技感</option><option value="cheerful">轻快</option><option value="serious">严肃</option><option value="relaxing">舒缓</option><option value="warm">温暖</option><option value="cinematic">电影感</option><option value="lofi">LoFi</option><option value="ambient">氛围</option><option value="piano">钢琴</option><option value="acoustic">原声吉他</option><option value="hiphop">嘻哈节奏</option><option value="edm">电子/EDM</option><option value="synthwave">合成波</option><option value="orchestral">史诗管弦</option><option value="corporate">商务轻快</option><option value="jazz">爵士</option><option value="rock">摇滚</option></select></div>
                            <div class="field"><label>BGM 曲目</label><select class="select" id="inBgmTrack"><option value="">自动</option></select></div>
                        </div>
                        <div class="form-grid-three">
                            <div class="field"><label>字幕</label><select class="select" id="inSubMode"><option value="zh" selected>中文</option><option value="off">关闭</option><option value="en">英文</option><option value="zh-en">中英同屏</option><option value="both">中英分轨</option></select></div>
                            <div class="field"><label>封面</label><select class="select" id="inCoverOrient"><option value="portrait">竖屏</option><option value="landscape">横屏</option></select></div>
                            <div class="field"><label>最长时长</label><select class="select" id="inDurMax"><option value="">自动</option><option value="60">1分钟</option><option value="600">10分钟</option><option value="1800">30分钟</option><option value="3600">60分钟</option></select></div>
                        </div>
                        <div class="field"><label>附加指令</label><textarea class="textarea" id="inInstr" style="min-height:70px;" placeholder="例如：更口语化、每句不超过20字"></textarea></div>
                        <div class="field"><label>语音样本</label><div class="row"><button class="btn btn-small" id="btnUploadVoiceSample"><i class="fas fa-microphone"></i>上传</button><span class="muted2" id="voiceSampleHint">未上传</span></div></div>
                        <div class="field"><label>视频样本</label><div class="row"><button class="btn btn-small" id="btnUploadAvatarSample"><i class="fas fa-video"></i>上传</button><span class="muted2" id="avatarSampleHint">未上传</span></div></div>
                    </div>
                    <div class="row" style="margin-top:16px; padding-top:12px; border-top:1px solid var(--stroke);"><button class="btn btn-primary grow" id="btnCreate" style="height:38px;"><i class="fas fa-wand-magic-sparkles"></i>开始生成</button></div>
                </div>
            </div>
            </section>

            <section class="ws-module" id="mod-task" data-module="task">
            <div class="module-h"><div class="title">2. 任务进度与脚本</div><div class="row"><button class="btn btn-small" id="btnOpenInProfile"><i class="fas fa-up-right-from-square"></i>个人页</button><button class="btn btn-small" id="btnDispatch" style="display:none;"><i class="fas fa-truck-fast"></i>重试</button><button class="btn btn-small" id="btnCancel"><i class="fas fa-ban"></i>取消</button><span class="drag-handle"><i class="fas fa-grip-vertical"></i></span></div></div>
            <div class="module-b">
                <div class="row" style="justify-content:space-between; margin-bottom:10px;">
                    <div class="tabs"><div class="tab active" data-tab="overview">概览</div><div class="tab" data-tab="draft">脚本</div><div class="tab" data-tab="history">回退</div></div>
                    <div class="row"><span class="badge" id="jobStatus">-</span><span class="badge" id="jobProgress">0%</span></div>
                </div>
                <div id="midBody">
                    <div id="tab_overview"><div class="card"><div style="font-weight:700;" id="jobTitle">未选择作品</div><div class="kv" style="margin-top:10px;"><div class="k">Job</div><div class="v" id="jobId">—</div><div class="k">Post</div><div class="v" id="postId">—</div><div class="k">Stage</div><div class="v" id="jobStage">—</div><div class="k">Message</div><div class="v" id="jobMsg">—</div><div class="k">Observability</div><div class="v" id="jobObs">—</div></div><div class="row" style="margin-top:12px;"><button class="btn btn-primary" id="btnRerun"><i class="fas fa-rotate-right"></i>重跑</button><button class="btn" id="btnSuggest"><i class="fas fa-lightbulb"></i>AI建议</button></div></div></div>
                    <div id="tab_draft" style="display:none;"><div class="card"><div class="row" style="justify-content:space-between;"><div style="font-weight:700;">脚本编辑</div><div class="row"><label class="muted2" style="font-size:12px;"><input type="checkbox" id="toggleRaw"> 原始JSON</label><button class="btn btn-primary btn-small" id="btnSaveDraft"><i class="fas fa-save"></i>保存</button></div></div><textarea class="textarea" id="draftEditor" style="min-height:200px; font-family:monospace; font-size:12px;" placeholder="脚本内容..."></textarea></div></div>
                    <div id="tab_history" style="display:none;"><div class="card"><div class="row" style="justify-content:space-between;"><div style="font-weight:700;">草稿历史</div><button class="btn btn-small" id="btnReloadHistory"><i class="fas fa-rotate"></i>刷新</button></div><div id="historyList" style="margin-top:10px;"></div></div></div>
                </div>
                <div style="margin-top:12px; padding-top:10px; border-top:1px solid var(--stroke);"><div style="font-size:12px; font-weight:600; margin-bottom:6px;">事件流</div><div id="evLog" class="muted2" style="font-size:11px; max-height:140px; overflow-y:auto; white-space:pre-wrap;"></div></div>
            </div>
            </section>

            <section class="ws-module" id="mod-preview" data-module="preview">
            <div class="module-h"><div class="title">3. 视频预览</div><div class="row"><button class="btn btn-small" id="btnReloadPreview"><i class="fas fa-rotate"></i>刷新</button><span class="drag-handle"><i class="fas fa-grip-vertical"></i></span></div></div>
            <div class="module-b">
                <div class="video-preview-wrap" style="background:#000; border-radius:var(--r-sm); overflow:hidden;"><video id="videoEl" class="video" controls playsinline></video></div>
                <div class="row" style="flex-wrap:wrap; gap:8px; margin-top:10px;"><button class="btn btn-primary btn-small" id="btnPublishPost"><i class="fas fa-paper-plane"></i>发布</button><button class="btn btn-small" id="btnToggleDownload"><i class="fas fa-unlock"></i><span>下载：关</span></button><button class="btn btn-small" id="btnListMedia"><i class="fas fa-layer-group"></i>版本</button><button class="btn btn-small" id="btnOpenPost"><i class="fas fa-eye"></i>打开</button><button class="btn btn-small" id="btnDownloadPost"><i class="fas fa-download"></i>下载</button></div>
                <div class="field" id="previewSubSelWrap" style="display:none;"><label>字幕轨</label><select class="select" id="subSel" style="max-width:160px;"><option value="off">字幕：关</option></select></div>
                <div id="mediaList" style="display:none; margin-top:10px;"></div>
            </div>
            </section>

            <section class="ws-module" id="mod-chat" data-module="chat">
            <div class="module-h"><div class="title">4. AI创作沟通</div><div class="row"><button class="btn btn-small" id="btnReloadChat"><i class="fas fa-rotate"></i>刷新</button><span class="drag-handle"><i class="fas fa-grip-vertical"></i></span></div></div>
            <div class="module-b">
                <div id="chatLog" class="chat-log"></div>
                <div class="chat-input"><textarea class="textarea grow" id="chatInput" placeholder="例如：把开头更抓人；每段加一句总结..."></textarea><button class="btn btn-primary" id="btnSendChat"><i class="fas fa-paper-plane"></i>发送</button></div>
                <div class="row" style="margin-top:8px;"><button class="btn btn-small" id="btnChatSuggest"><i class="fas fa-wand-magic-sparkles"></i>对话建议</button><button class="btn btn-small" id="btnReviseFromChat"><i class="fas fa-clone"></i>生成新版本</button></div>
            </div>
            </section>

            <section class="ws-module" id="mod-works" data-module="works">
            <div class="module-h"><div class="title" id="worksTitle">5. 我的创作（0）</div><div class="row"><button class="btn btn-small" id="btnRefreshPosts"><i class="fas fa-rotate"></i>刷新</button><span class="drag-handle"><i class="fas fa-grip-vertical"></i></span></div></div>
            <div class="module-b" id="worksModuleBody">
                <div class="field"><label>筛选</label><select class="select" id="postFilter"><option value="all">全部</option><option value="queued">queued</option><option value="processing">processing</option><option value="preview">preview</option><option value="done">done</option><option value="failed">failed</option><option value="returned">returned</option></select></div>
                <div class="list" id="postList"><div class="muted2" id="postListEmpty" style="padding:20px; text-align:center; font-size:13px;">暂无创作，请先创建任务</div></div>
            </div>
            </section>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <div id="chainDiagBadge" style="display:none; position:fixed; right:10px; bottom:10px; z-index:9999; background:rgba(0,0,0,0.8); color:#fff; padding:8px; font-size:11px; border-radius:8px;"></div>

    <script src="/static/js/hls.min.js"></script>
    <script src="{{ asset_url('js/app/studio.js') }}"></script>
    <script>
        (function(){
            const opt = document.getElementById('toggleOptional');
            const optFields = document.getElementById('optionalFields');
            if (opt && optFields) {
                let collapsed = false;
                opt.addEventListener('click', () => {
                    collapsed = !collapsed;
                    optFields.classList.toggle('collapsed', collapsed);
                    opt.classList.toggle('collapsed', collapsed);
                });
            }
            const board = document.getElementById('workspaceBoard');
            const modules = board ? board.querySelectorAll('.ws-module') : [];
            let dragged = null;
            modules.forEach(mod => {
                const h = mod.querySelector('.module-h');
                if (h) {
                    h.addEventListener('mousedown', (e) => {
                        if (e.target.closest('button')) return;
                        dragged = mod;
                        mod.classList.add('dragging');
                        const rect = mod.getBoundingClientRect();
                        const ox = e.clientX - rect.left, oy = e.clientY - rect.top;
                        const onMove = (ev) => {
                            if (!dragged) return;
                            const x = ev.clientX - ox, y = ev.clientY - oy;
                            mod.style.position = 'fixed';
                            mod.style.left = x + 'px';
                            mod.style.top = y + 'px';
                            mod.style.width = rect.width + 'px';
                            mod.style.zIndex = 1000;
                        };
                        const onUp = (evUp) => {
                            if (!dragged) return;
                            mod.classList.remove('dragging');
                            mod.style.position = '';
                            mod.style.left = '';
                            mod.style.top = '';
                            mod.style.width = '';
                            mod.style.zIndex = '';
                            const mid = evUp.clientX, may = evUp.clientY;
                            let best = null, bestD = Infinity;
                            modules.forEach(m => {
                                if (m === mod) return;
                                const r = m.getBoundingClientRect();
                                const cx = r.left + r.width/2, cy = r.top + r.height/2;
                                const d = Math.hypot(mid - cx, may - cy);
                                if (d < bestD) { bestD = d; best = m; }
                            });
                            if (best) board.insertBefore(mod, best);
                            else board.appendChild(mod);
                            try { if (window.studioSaveModuleOrder) window.studioSaveModuleOrder(); } catch (_) {}
                            dragged = null;
                            document.removeEventListener('mousemove', onMove);
                            document.removeEventListener('mouseup', onUp);
                        };
                        document.addEventListener('mousemove', onMove);
                        document.addEventListener('mouseup', onUp);
                    });
                }
            });
            const worksBody = document.getElementById('worksModuleBody');
            if (worksBody) {
                worksBody.addEventListener('scroll', function() {
                    const el = this;
                    if (el.scrollHeight - el.scrollTop - el.clientHeight < 80 && window.studioLoadMore) window.studioLoadMore();
                });
            }
        })();
    </script>
</body>
</html>
