<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="aiseek-build" content="{{ build_id }}">
    <link rel="icon" href="/static/img/logo.svg" type="image/svg+xml">
    <title>AI创作工作台 - AIseek</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body, body * {
            -webkit-user-select: text !important;
            user-select: text !important;
        }
        button, .btn, [role="button"], .status-pill, .drag-handle {
            -webkit-user-select: none !important;
            user-select: none !important;
        }
        :root {
            --bg: #0f1219;
            --surface: #171b25;
            --surface-soft: #1f2532;
            --text: #f5f7ff;
            --muted: rgba(245,247,255,0.68);
            --muted2: rgba(245,247,255,0.50);
            --stroke: rgba(255,255,255,0.16);
            --stroke-soft: rgba(255,255,255,0.10);
            --primary: #fe2c55;
            --title-bg: rgba(254,44,85,0.94);
            --r-sm: 8px;
            --r-md: 12px;
            --r-lg: 14px;
            --s-1: 8px;
            --s-2: 16px;
            --s-3: 24px;
            --dur-fast: 120ms;
            --dur-base: 180ms;
            --good: #4ade80;
            --warn: #fbbf24;
            --bad: #f87171;
        }
        body[data-theme="light"] {
            --bg: #f3f5fa;
            --surface: #ffffff;
            --surface-soft: #f6f8fc;
            --text: #141a28;
            --muted: rgba(20,26,40,0.74);
            --muted2: rgba(20,26,40,0.56);
            --stroke: rgba(18,21,33,0.14);
            --stroke-soft: rgba(18,21,33,0.08);
            --primary: #e11d48;
            --title-bg: rgba(225,29,72,0.90);
        }
        body[data-title-tone="soft"] { --title-bg: rgba(254,44,85,0.72); }
        body[data-theme="light"][data-title-tone="soft"] { --title-bg: rgba(225,29,72,0.62); }
        body[data-brand="vivid"] {
            --primary: #ff375f;
            --title-bg: rgba(255,55,95,0.94);
        }
        body[data-theme="light"][data-brand="vivid"] {
            --primary: #d91645;
            --title-bg: rgba(217,22,69,0.90);
        }
        body[data-density="compact"] {
            --s-1: 6px;
            --s-2: 12px;
            --s-3: 18px;
        }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background: radial-gradient(1200px 520px at 4% -12%, color-mix(in srgb, var(--primary) 10%, transparent), transparent 62%), var(--bg); color: var(--text); }
        a { color: inherit; text-decoration: none; }
        .topbar { height: 62px; display: flex; align-items: center; justify-content: space-between; padding: 0 18px; background: color-mix(in srgb, var(--bg) 94%, #000 6%); position: sticky; top: 0; z-index: 20; border-bottom: 0; backdrop-filter: blur(8px); box-shadow: 0 8px 20px rgba(0,0,0,0.10); }
        .topbar .row { flex-wrap: nowrap; gap: 8px; min-width: 0; }
        .topbar .row:last-child { margin-left: auto; justify-content: flex-end; flex: 1; }
        .brand { display: flex; align-items: center; gap: 10px; font-weight: 800; letter-spacing: -0.3px; }
        .brand .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); }
        .pill { display: inline-flex; align-items: center; gap: var(--s-1); padding: 8px 11px; border-radius: 999px; background: var(--surface-soft); border: 1px solid var(--stroke); transition: all var(--dur-fast) cubic-bezier(.2,.8,.2,1); }
        .pill:hover { background: var(--surface); }
        .btn { display: inline-flex; align-items: center; gap: var(--s-1); border: 0; cursor: pointer; border-radius: var(--r-sm); height: 36px; padding: 0 12px; background: var(--surface-soft); color: var(--text); border: 1px solid var(--stroke); transition: all var(--dur-fast) cubic-bezier(.2,.8,.2,1); font-size: 13px; font-weight: 600; }
        .btn:hover { background: var(--surface); transform: translateY(-1px); }
        .btn span { white-space: nowrap; }
        .btn-primary { background: rgba(254,44,85,0.16); border-color: rgba(254,44,85,0.44); }
        .btn-primary:hover { background: rgba(254,44,85,0.24); }
        .btn-danger { background: rgba(248,113,113,0.15); border-color: rgba(248,113,113,0.35); }
        .btn-danger:hover { background: rgba(248,113,113,0.22); }
        .btn-small { height: 32px; padding: 0 10px; border-radius: var(--r-sm); font-size: 12px; font-weight: 600; }
        .layout { padding: var(--s-2); min-height: calc(100vh - 62px); max-width: 1800px; margin: 0 auto; }
        .workspace-board { height: auto; overflow: visible; column-count: 3; column-gap: var(--s-2); }
        .workspace-board::-webkit-scrollbar { width: 8px; height: 8px; }
        .workspace-board::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.18); border-radius: 999px; }
        .workspace-board::-webkit-scrollbar-track { background: transparent; }
        .ws-module { width: 100%; break-inside: avoid; margin: 0 0 var(--s-2); background: color-mix(in srgb, var(--surface) 96%, transparent); border: 1px solid var(--stroke); border-radius: var(--r-lg); overflow: hidden; display: flex; flex-direction: column; min-height: 220px; box-shadow: 0 8px 18px color-mix(in srgb, #000 8%, transparent); }
        .ws-module[data-size="wide"] { width: 100%; }
        .ws-module.dragging { opacity: .66; transform: scale(.995); }
        .module-h { padding: 0 12px; border-bottom: 0; display: flex; align-items: center; justify-content: space-between; gap: var(--s-1); background: linear-gradient(90deg, var(--title-bg), color-mix(in srgb, var(--title-bg) 84%, #000 16%)); height: 44px; min-height: 44px; }
        .module-h .title { margin: 0; font-size: 13px; font-weight: 800; letter-spacing: 0.2px; color: #fff; }
        .module-b { padding: var(--s-2); overflow: visible; min-height: 0; flex: 1; background: transparent; }
        .module-b::-webkit-scrollbar { width: 8px; height: 8px; }
        .module-b::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.18); border-radius: 999px; }
        .module-b::-webkit-scrollbar-track { background: transparent; }
        .drag-handle { display: inline-flex; align-items: center; justify-content: center; width: 30px; height: 30px; border-radius: var(--r-sm); border: 1px solid var(--stroke); background: var(--surface-soft); color: var(--muted); cursor: grab; user-select: none; }
        .drag-handle:active { cursor: grabbing; }
        body, .ws-module, .module-b, .msg .c, .kv .v, .input, .textarea, pre {
            -webkit-user-select: text !important;
            user-select: text !important;
        }
        #mod-create { min-height: max(700px, calc(100vh - 94px)); }
        #mod-create .module-b { overflow: visible; }
        #mod-task, #mod-preview, #mod-chat, #mod-works { min-height: 0; }
        #mod-works .module-b { max-height: 620px; overflow: auto; }
        #mod-chat { min-height: 320px; }
        #mod-works { min-height: 320px; }
        #midBody { overflow: visible; }
        .right-events { border-top: 0; padding: 12px 0 0; background: transparent; }
        .section-head { display:flex; align-items:center; justify-content:space-between; margin-bottom: var(--s-1); }
        .section-head .t { font-weight: 800; font-size: 13px; letter-spacing: 0.2px; color: rgba(255,255,255,0.90); }
        .section-tag { font-size: 11px; color: rgba(255,255,255,0.55); padding: 3px 9px; border: 1px solid rgba(255,255,255,0.16); border-radius: 999px; background: rgba(255,255,255,0.05); }
        .muted { color: var(--muted); }
        .muted2 { color: var(--muted2); }
        .hr { display: none; }
        .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
        .field label { font-size: 12px; color: var(--muted); }
        .input, .select, .textarea { background: var(--surface-soft); border: 1px solid var(--stroke); color: var(--text); border-radius: var(--r-sm); padding: 10px 12px; outline: none; transition: all var(--dur-fast) ease; }
        .input:focus, .select:focus, .textarea:focus { border-color: rgba(254,44,85,0.62); box-shadow: 0 0 0 2px rgba(254,44,85,0.18); }
        .select { width: 100%; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .textarea { min-height: 140px; resize: vertical; }
        .row { display: flex; gap: var(--s-1); align-items: center; flex-wrap: wrap; }
        .grow { flex: 1; min-width: 0; }
        .form-grid-two { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .form-grid-three { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .inline-grid-two { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s-2); margin-bottom: 12px; }
        .inline-grid-three { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s-2); margin-bottom: 12px; }
        .inline-ctl { display: flex; align-items: center; gap: var(--s-1); }
        .inline-ctl .name { font-size: 12px; color: var(--muted); min-width: 42px; white-space: nowrap; }
        .inline-ctl .select { flex: 1; min-width: 0; }
        .inline-ctl.wide .name { min-width: 44px; }
        .inline-ctl.wide .select { min-width: 198px; }
        .bgm-track-full { margin-top: 6px; font-size: 12px; color: var(--muted2); line-height: 1.25; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; word-break: break-word; }
        .badge { font-size: 12px; padding: 4px 8px; border-radius: 999px; border: 1px solid var(--stroke); background: transparent; color: var(--muted); }
        .badge.good { color: var(--good); border-color: rgba(74,222,128,0.35); background: rgba(74,222,128,0.10); }
        .badge.warn { color: var(--warn); border-color: rgba(251,191,36,0.35); background: rgba(251,191,36,0.10); }
        .badge.bad { color: var(--bad); border-color: rgba(248,113,113,0.35); background: rgba(248,113,113,0.10); }
        .list { display: flex; flex-direction: column; gap: 10px; }
        .card { background: transparent; border: 0; border-radius: var(--r-sm); padding: var(--s-2); transition: all var(--dur-base) ease; }
        .card:hover { border-color: transparent; }
        .card.active { border-color: rgba(254,44,85,0.55); box-shadow: 0 0 0 1px rgba(254,44,85,0.22) inset; }
        .card-title { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .card-title .t { font-size: 13px; font-weight: 700; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .card-sub { font-size: 12px; color: var(--muted2); margin-top: 6px; display: flex; gap: 8px; flex-wrap: wrap; }
        .works-card-list .card-title .t { max-width: none; width: 100%; }
        .status-pill { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); border: 1px solid var(--stroke); border-radius: 999px; height: 26px; padding: 0 10px; background: color-mix(in srgb, var(--surface-soft) 90%, transparent); }
        .status-pill::before { content: ""; width: 6px; height: 6px; border-radius: 999px; background: currentColor; opacity: .9; }
        .status-pill.good { color: var(--good); }
        .status-pill.warn { color: var(--warn); }
        .status-pill.bad { color: var(--bad); }
        .tabs { display: flex; gap: var(--s-1); padding: 8px 0; border-bottom: 0; background: transparent; }
        .tab { cursor: pointer; padding: 8px 10px; border-radius: var(--r-sm); border: 1px solid var(--stroke-soft); color: var(--muted); background: transparent; font-size: 13px; transition: all var(--dur-fast) ease; }
        .tab:hover { border-color: var(--stroke); background: var(--surface); }
        .tab.active { color: #fff; border-color: rgba(254,44,85,0.62); background: rgba(254,44,85,0.92); }
        .editor { width: 100%; min-height: 240px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace; font-size: 12px; line-height: 1.4; }
        .video { width: 100%; aspect-ratio: 16/9; border-radius: 12px; background: #000; border: 1px solid rgba(255,255,255,0.14); object-fit: contain; }
        #mod-preview .module-b { padding: 0; }
        #mod-preview .card { padding: 0; }
        #mod-preview .video-preview-wrap { line-height: 0; }
        #mod-preview .video { display: block; border: 0; border-radius: 0; width: 100%; height: auto; aspect-ratio: auto; object-fit: contain; max-height: 600px; }
        #mod-preview .row { padding: 10px 12px; }
        #mod-preview #mediaList { margin: 0 12px 12px; }
        .kv { display: grid; grid-template-columns: 92px 1fr; gap: 8px 10px; font-size: 12px; }
        .kv .k { color: var(--muted2); }
        .kv .v { color: rgba(255,255,255,0.86); word-break: break-all; }
        .chat { display: flex; flex-direction: column; gap: 10px; }
        .chat-log { display: flex; flex-direction: column; gap: 10px; max-height: 420px; overflow: auto; padding-right: 4px; }
        .msg { padding: 10px 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.08); background: rgba(0,0,0,0.14); }
        .msg.user { border-color: rgba(254,44,85,0.28); }
        .msg.assistant { border-color: rgba(96,165,250,0.25); }
        .msg .r { font-size: 11px; color: var(--muted2); margin-bottom: 6px; }
        .msg .c { white-space: pre-wrap; font-size: 13px; line-height: 1.55; color: rgba(255,255,255,0.88); }
        .chat-input { display: flex; gap: 8px; }
        .chat-input textarea { min-height: 132px; resize: vertical; }
        .works-card-list.compact .card { padding: 7px 8px; border-radius: var(--r-sm); }
        .works-card-list.compact .card-sub { font-size: 11px; margin-top: 4px; }
        .works-card-list.compact .card-title .t { font-size: 12px; max-width: 180px; }
        body[data-theme="light"] .tab.active { color: #fff; }
        .toast { position: fixed; right: 16px; bottom: 16px; background: rgba(0,0,0,0.72); color: rgba(255,255,255,0.92); border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; padding: 10px 12px; max-width: 420px; display: none; z-index: 99; box-shadow: 0 16px 38px rgba(0,0,0,0.36); }
        .toast.show { display: block; }
        @media (max-width: 1560px) {
            .workspace-board { column-count: 2; }
            #mod-create { min-height: 640px; }
        }
        @media (max-width: 1320px) {
            #buildTag { display: none; }
        }
        @media (max-width: 1200px) {
            .layout { height: auto; min-height: 0; }
            .workspace-board { height: auto; column-count: 1; }
            #mod-create, #mod-task, #mod-preview, #mod-chat, #mod-works { min-height: 0; }
            #mod-works .module-b { max-height: none; }
            .form-grid-two, .form-grid-three { grid-template-columns: 1fr; }
            .inline-grid-two, .inline-grid-three { grid-template-columns: 1fr; }
            .topbar .row:last-child { flex: 1; justify-content: flex-end; }
        }
    </style>
    <script>
        (function () {
            const isControl = function (el) {
                try {
                    return !!(el && el.closest && el.closest('button,.btn,[role="button"],.drag-handle,.status-pill,input,textarea,select,option,a'));
                } catch (_) {
                    return false;
                }
            };
            document.addEventListener('selectstart', function (e) {
                if (isControl(e.target)) return;
                try { e.stopImmediatePropagation(); } catch (_) {}
            }, true);
            document.addEventListener('dragstart', function (e) {
                if (isControl(e.target)) return;
                try { e.preventDefault(); } catch (_) {}
                try { e.stopImmediatePropagation(); } catch (_) {}
            }, true);
        })();
    </script>
</head>
<body>
    <div class="topbar">
        <div class="row">
            <a class="pill" href="/"><i class="fas fa-arrow-left"></i><span>首页</span></a>
            <div class="brand"><span class="dot"></span><span>AI创作工作台</span></div>
            <span class="muted2" id="buildTag">{{ build_id }}</span>
        </div>
        <div class="row">
            <button class="btn btn-small" id="btnTheme"><i class="fas fa-circle-half-stroke"></i><span id="themeLabel">主题</span></button>
            <button class="btn btn-small" id="btnTitleTone"><i class="fas fa-fill-drip"></i><span id="titleToneLabel">红阶</span></button>
            <button class="btn btn-small" id="btnBrand"><i class="fas fa-palette"></i><span id="brandLabel">稳重</span></button>
            <button class="btn btn-small" id="btnDensity"><i class="fas fa-arrows-up-down"></i><span id="densityLabel">舒适</span></button>
            <button class="btn btn-small" id="btnResetLayout"><i class="fas fa-rotate-left"></i><span>重置</span></button>
        </div>
    </div>

    <div class="layout">
        <div class="workspace-board" id="workspaceBoard">
            <section class="ws-module" id="mod-create" data-module="create" data-size="narrow" draggable="false">
            <div class="module-h">
                <div class="title">1. 新建AI视频任务</div>
                <div class="row">
                    <span class="drag-handle" title="拖动模块"><i class="fas fa-grip-vertical"></i></span>
                </div>
            </div>
            <div class="module-b">
                <div id="loginBox" class="card">
                    <div class="row" style="justify-content:space-between;">
                        <div style="font-weight:700;">登录</div>
                        <div class="muted2" style="font-size:12px;">账号与主站共用</div>
                    </div>
                    <div class="hr"></div>
                    <div class="field">
                        <label>用户名</label>
                        <input class="input" id="loginUser" placeholder="admin / testuser / demo">
                    </div>
                    <div class="field">
                        <label>密码</label>
                        <input class="input" id="loginPass" type="password" placeholder="admin123 / test123 / demo123">
                    </div>
                    <div class="row">
                        <button class="btn btn-primary grow" id="btnLogin"><i class="fas fa-right-to-bracket"></i>登录</button>
                        <button class="btn grow" id="btnQuickAdmin">Admin</button>
                    </div>
                </div>

                <div id="createBox" class="card" style="display:none;">
                    <div class="row" style="justify-content:flex-end;">
                        <span class="badge" id="cooldownBadge" style="display:none;">冷却中</span>
                    </div>
                    <div class="field">
                        <label>标题（可选）</label>
                        <input class="input" id="inTitle" placeholder="例如：5分钟搞懂 RAG 与 Agent">
                    </div>
                    <div class="field">
                        <label>标签（可选）</label>
                        <input class="input" id="inTags" placeholder="多个标签用空格/逗号分隔，如 AI 创作 科普">
                    </div>
                    <div class="field">
                        <label>用户文稿（将转为口播稿/脚本）</label>
                            <textarea class="textarea" id="inContent" placeholder="粘贴你的长文稿或要点..."></textarea>
                    </div>
                    <div class="inline-grid-two">
                        <div class="inline-ctl">
                            <span class="name">分类</span>
                            <select class="select" id="inCategory"></select>
                        </div>
                        <div class="inline-ctl">
                            <span class="name">口播风格</span>
                            <select class="select" id="inVoice">
                                <option value="premium_female">高拟真女声（中文）</option>
                                <option value="premium_male">高拟真男声（中文）</option>
                                <option value="premium_news">专业播报（中文）</option>
                                <option value="premium_en">高拟真女声（EN）</option>
                            </select>
                        </div>
                    </div>
                    <div class="inline-grid-two">
                        <div class="inline-ctl">
                            <span class="name">BGM 氛围</span>
                            <select class="select" id="inBgm">
                                <option value="">默认</option>
                                <option value="none">无BGM</option>
                                <option value="tech">科技感</option>
                                <option value="cheerful">轻快</option>
                                <option value="serious">严肃</option>
                                <option value="relaxing">舒缓</option>
                                <option value="warm">温暖</option>
                                <option value="cinematic">电影感</option>
                                <option value="lofi">LoFi</option>
                                <option value="ambient">氛围</option>
                                <option value="piano">钢琴</option>
                                <option value="acoustic">原声吉他</option>
                                <option value="hiphop">嘻哈节奏</option>
                                <option value="edm">电子/EDM</option>
                                <option value="synthwave">合成波</option>
                                <option value="orchestral">史诗管弦</option>
                                <option value="corporate">商务轻快</option>
                                <option value="jazz">爵士</option>
                                <option value="rock">摇滚</option>
                            </select>
                        </div>
                        <div class="inline-ctl">
                            <span class="name">BGM 曲目</span>
                            <select class="select" id="inBgmTrack">
                                <option value="">自动</option>
                            </select>
                            <div class="bgm-track-full" id="bgmTrackFull" style="display:none;"></div>
                        </div>
                    </div>
                    <div class="inline-grid-three">
                        <div class="inline-ctl wide">
                            <span class="name">字幕</span>
                            <select class="select" id="inSubMode">
                                <option value="zh" selected>中文（默认）</option>
                                <option value="off">关闭</option>
                                <option value="en">英文</option>
                                <option value="zh-en">中英同屏</option>
                                <option value="both">中英（分轨）</option>
                            </select>
                        </div>
                        <div class="inline-ctl wide">
                            <span class="name">封面</span>
                            <select class="select" id="inCoverOrient">
                                <option value="portrait">竖屏</option>
                                <option value="landscape">横屏</option>
                            </select>
                        </div>
                    </div>
                    <div class="inline-grid-two">
                        <div class="inline-ctl">
                            <span class="name">最长时长</span>
                            <select class="select" id="inDurMax">
                                <option value="">自动</option>
                                <option value="60">1分钟</option>
                                <option value="600">10分钟</option>
                                <option value="1800">30分钟</option>
                                <option value="3600">60分钟</option>
                            </select>
                        </div>
                    </div>
                    <div class="row">
                        <div class="field grow" style="margin:0;">
                            <label>附加指令（可选）</label>
                            <textarea class="textarea" id="inInstr" style="min-height:84px;" placeholder="例如：更口语化、每句不超过20字"></textarea>
                        </div>

    <div id="chainDiagBadge" style="position:fixed; right:10px; bottom:10px; z-index:2147483647; background:rgba(0,0,0,0.78); color:#fff; border:1px solid rgba(255,255,255,0.22); border-radius:10px; padding:8px 10px; font-size:11px; line-height:1.35; max-width:min(58vw,540px); white-space:pre-wrap;"></div>

    <script src="/static/js/hls.min.js"></script>
    <script src="{{ asset_url('js/app/studio.js') }}"></script>
    <script>
        (function () {
            const badge = document.getElementById('chainDiagBadge');
            if (!badge) return;
            const build = '{{ build_id }}';
            const entry = (document.querySelector('script[src*="studio.js"]') || {}).src || '';
            let lastReport = '';
            let lastReportTs = 0;
            const probeSelect = function () {
                try {
                    const node = document.querySelector('#mod-task .title, #mod-create .title, .ws-module .title');
                    if (!node) return { ok: false, len: 0 };
                    const r = document.createRange();
                    r.selectNodeContents(node);
                    const s = window.getSelection();
                    s.removeAllRanges();
                    s.addRange(r);
                    const txt = String(s.toString() || '');
                    return { ok: txt.length > 0, len: txt.length };
                } catch (_) {
                    return { ok: false, len: 0 };
                }
            };
            const probeEvents = function () {
                try {
                    const node = document.querySelector('#mod-task .title, #mod-create .title, .ws-module .title');
                    if (!node) return { pd_blocked: 0, md_blocked: 0, ss_blocked: 0 };
                    const mk = (type) => {
                        if (type === 'pointerdown' && typeof PointerEvent === 'function') return new PointerEvent(type, { bubbles: true, cancelable: true });
                        if (type === 'mousedown') return new MouseEvent(type, { bubbles: true, cancelable: true });
                        return new Event(type, { bubbles: true, cancelable: true });
                    };
                    const pd = mk('pointerdown'); node.dispatchEvent(pd);
                    const md = mk('mousedown'); node.dispatchEvent(md);
                    const ss = mk('selectstart'); node.dispatchEvent(ss);
                    return { pd_blocked: pd.defaultPrevented ? 1 : 0, md_blocked: md.defaultPrevented ? 1 : 0, ss_blocked: ss.defaultPrevented ? 1 : 0 };
                } catch (_) {
                    return { pd_blocked: 1, md_blocked: 1, ss_blocked: 1 };
                }
            };
            const reportProbe = function (payload) {
                try {
                    const qs = new URLSearchParams(payload || {});
                    const u = '/api/v1/debug/client-probe/ping?' + qs.toString() + '&_=' + Date.now();
                    try {
                        if (navigator && typeof navigator.sendBeacon === 'function') {
                            const ok = navigator.sendBeacon(u, new Blob([], { type: 'text/plain' }));
                            if (ok) return;
                        }
                    } catch (_) {}
                    try {
                        const img = new Image();
                        img.src = u;
                    } catch (_) {}
                } catch (_) {}
            };
            const paint = function (diag, selProbe) {
                const latest = (diag && diag.latest) || {};
                const probe = (diag && diag.probe) || {};
                const cp = (diag && diag.client_probe && diag.client_probe.probe) || {};
                const cpAge = Number((diag && diag.client_probe_age_sec) || 0);
                const cpFresh = !!(diag && diag.client_probe_fresh);
                const lines = [
                    'chain:studio',
                    'build=' + build,
                    'instance=' + String((diag && diag.instance_id) || '-'),
                    'entry=' + entry,
                    'select=' + (selProbe.ok ? 'ok' : 'fail') + '(' + selProbe.len + ')',
                    'job=' + String(latest.job_id || '-'),
                    'status=' + String(latest.status || '-'),
                    'draft_scenes=' + String(latest.draft_scenes || 0),
                    'result_scenes=' + String(latest.result_scenes || 0),
                    'cover=' + (latest.has_cover ? '1' : '0'),
                    'probe_post=' + String(probe.post_id || 78),
                    'probe_exist=' + String(probe.exists === false ? 0 : 1),
                    'probe_ps=' + String(probe.result_scenes || 0),
                    'ev_pd=' + String(cp.pd_blocked || 0),
                    'ev_md=' + String(cp.md_blocked || 0),
                    'ev_ss=' + String(cp.ss_blocked || 0),
                    'probe_age=' + String(cpAge > 0 ? cpAge : 0) + 's',
                    'probe_live=' + (cpFresh ? '1' : '0'),
                ];
                badge.textContent = lines.join('\n');
            };
            const run = function () {
                const probe = probeSelect();
                const evp = probeEvents();
                fetch('/api/v1/debug/chain-status?post_id=78&_=' + Date.now(), { credentials: 'include', cache: 'no-store' })
                    .then((r) => r.json())
                    .then((j) => {
                        paint(j, probe);
                        try {
                            const payload = {
                                page: 'studio',
                                build: build,
                                entry: entry,
                                href: String(location.href || ''),
                                sel_ok: !!probe.ok,
                                sel_len: Number(probe.len || 0),
                                assets: (j && j.assets) || {},
                                probe78: (j && j.probe) || {},
                            };
                            const sig = JSON.stringify(payload);
                            const now = Date.now();
                            if (sig !== lastReport || (now - lastReportTs) > 60000) {
                                lastReport = sig;
                                lastReportTs = now;
                                const p = (j && j.probe) || {};
                                const a = (j && j.assets) || {};
                                reportProbe({
                                    page: 'studio',
                                    build: String(build || ''),
                                    entry: String(entry || ''),
                                    href: String(location.href || ''),
                                    sel_ok: String(!!probe.ok),
                                    sel_len: String(Number(probe.len || 0)),
                                    probe_ps: String(Number(p.result_scenes || 0)),
                                    probe_exist: String(p.exists === false ? 0 : 1),
                                    actions_js: String(a.actions_js || ''),
                                    pd_blocked: String(evp.pd_blocked || 0),
                                    md_blocked: String(evp.md_blocked || 0),
                                    ss_blocked: String(evp.ss_blocked || 0),
                                });
                            }
                        } catch (_) {}
                    })
                    .catch(() => paint({}, probe));
            };
            run();
            setInterval(run, 5000);
        })();
    </script>
