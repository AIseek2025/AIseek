services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=aiseek
      - POSTGRES_PASSWORD=aiseek_password
      - POSTGRES_DB=aiseek_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiseek -d aiseek_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    command: gunicorn app.main:app -k uvicorn.workers.UvicornWorker -w 2 -b 0.0.0.0:5000 --timeout 45 --graceful-timeout 15 --keep-alive 5
    volumes:
      - ./backend:/app
    ports:
      - "5001:5000"
    environment:
      - DATABASE_URL=postgresql://aiseek:aiseek_password@db:5432/aiseek_db
      - READ_DATABASE_URL=postgresql://aiseek:aiseek_password@db:5432/aiseek_db
      - DB_POOL_SIZE=20
      - DB_MAX_OVERFLOW=40
      - DB_POOL_TIMEOUT_SEC=30
      - DB_POOL_RECYCLE_SEC=1800
      - REDIS_URL=redis://redis:6379/0
      - REDIS_SOCKET_TIMEOUT_SEC=0.6
      - REDIS_CONNECT_TIMEOUT_SEC=0.3
      - REDIS_MAX_CONNECTIONS=300
      - WORKER_SECRET=m3pro_worker_2026
      - WORKER_URL=http://worker:8000
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  worker:
    build: 
      context: ./worker
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./worker:/app
      - ./worker/outputs:/app/outputs
      - ./worker/assets:/app/assets
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://aiseek:aiseek_password@db:5432/aiseek_db
      - REDIS_URL=redis://redis:6379/0
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - WORKER_SECRET=m3pro_worker_2026
      - WEB_URL=http://backend:5000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
