name: Deploy to Aliyun

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'worker/**'
      - 'deploy/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 仅在配置了阿里云 SSH 密钥时执行
    if: ${{ secrets.ALIYUN_HOST != '' }}
    steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.ALIYUN_HOST }}
        username: ${{ secrets.ALIYUN_USER }}
        key: ${{ secrets.ALIYUN_SSH_KEY }}
        port: 22
        script: |
          # 定义项目路径
          PROJECT_DIR="/root/AIseek-Trae-v1"
          
          # 1. 检查目录是否存在，不存在则克隆
          if [ ! -d "$PROJECT_DIR" ]; then
            echo "Project directory not found. Cloning from GitHub..."
            git clone https://github.com/AIseek2025/AIseek.git "$PROJECT_DIR"
          fi
          
          # 2. 进入项目目录并更新代码
          cd "$PROJECT_DIR"
          echo "Updating code..."
          git fetch origin
          git reset --hard origin/main
          
          # 3. 进入部署脚本目录
          cd deploy/aliyun
          
          # 4. 赋予脚本执行权限并执行
          chmod +x update.sh
          echo "Running update script..."
          ./update.sh
