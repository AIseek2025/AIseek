name: Deploy to Aliyun

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'worker/**'
      - 'deploy/**'
  workflow_dispatch:
    inputs:
      branch:
        description: "Deploy branch"
        required: true
        default: "main"
      services:
        description: "Comma-separated services"
        required: true
        default: "backend,worker,nginx"
      skip_migrate:
        description: "Skip alembic migration"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]
      skip_health_check:
        description: "Skip backend health check"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 仅在配置了阿里云 SSH 密钥时执行
    if: ${{ secrets.ALIYUN_HOST != '' }}
    steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.ALIYUN_HOST }}
        username: ${{ secrets.ALIYUN_USER }}
        key: ${{ secrets.ALIYUN_SSH_KEY }}
        port: 22
        script: |
          set -e
          PROJECT_DIR="/root/AIseek-Trae-v1"

          if [ ! -d "$PROJECT_DIR" ]; then
            echo "Project directory not found. Cloning from GitHub..."
            git clone https://github.com/AIseek2025/AIseek.git "$PROJECT_DIR"
          fi

          cd "$PROJECT_DIR"
          cd deploy/aliyun

          chmod +x update.sh
          echo "Running update script..."
          BRANCH="${{ github.event.inputs.branch || 'main' }}"
          SERVICES="${{ github.event.inputs.services || 'backend,worker,nginx' }}"
          SKIP_MIGRATE="${{ github.event.inputs.skip_migrate || 'false' }}"
          SKIP_HEALTH="${{ github.event.inputs.skip_health_check || 'false' }}"

          args=(--branch "$BRANCH" --services "$SERVICES")
          if [ "$SKIP_MIGRATE" = "true" ]; then
            args+=(--skip-migrate)
          fi
          if [ "$SKIP_HEALTH" = "true" ]; then
            args+=(--skip-health-check)
          fi
          ./update.sh "${args[@]}"
