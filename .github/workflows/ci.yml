name: CI

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Install browser deps (Playwright)
        run: |
          python -m playwright install --with-deps chromium
      - name: Static checks
        run: |
          python -m compileall backend/app worker/app
          python backend/scripts/theme_audit.py
          python backend/scripts/check_no_raw_fetch.py
      - name: Initialize database
        run: |
          cd backend
          python init_db.py
      - name: Start backend service
        run: |
          cd backend
          nohup python -m uvicorn app.main:app --host 0.0.0.0 --port 5002 > /tmp/backend.log 2>&1 &
          echo "Waiting for backend to start..."
          sleep 5
          for i in {1..10}; do
            if curl -s http://127.0.0.1:5002/health > /dev/null 2>&1; then
              echo "Backend is ready!"
              exit 0
            fi
            echo "Waiting... ($i/10)"
            sleep 2
          done
          echo "Backend failed to start. Logs:"
          cat /tmp/backend.log
          exit 1
      - name: Smoke tests
        run: |
          python backend/scripts/ci_smoke.py http://127.0.0.1:5002
