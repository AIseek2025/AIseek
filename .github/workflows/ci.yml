name: CI

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Install browser deps (Playwright)
        run: |
          python -m playwright install --with-deps chromium
      - name: Static checks
        run: |
          python -m compileall backend/app worker/app
          python backend/scripts/theme_audit.py
          python backend/scripts/check_no_raw_fetch.py
      - name: Initialize database
        run: |
          python backend/init_db.py
      - name: Smoke tests
        run: |
          python backend/scripts/ci_smoke.py http://127.0.0.1:5002 2>&1 | tee smoke.log
        continue-on-error: true
      
      - name: Upload smoke log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-logs
          path: smoke.log
          retention-days: 7
      
      - name: Check database tables
        run: |
          sqlite3 sql_app.db ".tables"
      
      - name: Verify static files
        run: |
          ls -la backend/static/js/app/ | head -20
          ls -la backend/templates/ | head -10
