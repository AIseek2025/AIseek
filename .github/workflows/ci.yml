name: CI

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Install browser deps (Playwright)
        run: |
          python -m playwright install --with-deps chromium
      - name: Static checks
        run: |
          python -m compileall backend/app worker/app
          python backend/scripts/theme_audit.py
          python backend/scripts/check_no_raw_fetch.py
      - name: Initialize database
        env:
          DATABASE_URL: sqlite:///sql_app.db
        run: |
          python backend/init_db.py
      - name: Smoke tests (with debug logging)
        env:
          DATABASE_URL: sqlite:///sql_app.db
          REDIS_URL: redis://localhost:6379/0
          WORKER_SECRET: m3pro_worker_2026
        run: |
          echo "=== Starting Smoke Tests ==="
          echo "Python version: $(python --version)"
          echo "Working directory: $(pwd)"
          echo "Database file: $(ls -la sql_app.db 2>&1 || echo 'Not found')"
          echo ""
          echo "=== Running Smoke Test ==="
          python backend/scripts/ci_smoke.py http://127.0.0.1:5002 2>&1 | tee smoke_test.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo ""
          echo "=== Smoke Test Exit Code: $EXIT_CODE ==="
          if [ $EXIT_CODE -ne 0 ]; then
            echo "Smoke test failed! Check logs above."
            echo "Common exit codes:"
            echo "  2 = /livez health check timeout (server didn't start)"
            echo "  3 = /readyz check failed"
            echo "  4 = /metrics endpoint failed"
            echo "  6 = interaction_smoke_test.py failed"
            echo "  7 = callback_smoke_test.py failed"
            echo "  8 = worker_callback_alert_smoke_test.py failed"
            echo "  9 = e2e_ui_smoke.py (Playwright) failed"
            echo "  10 = ai_pipeline_regression_guard.py failed"
            echo "  11 = ai_long_text_quality_regression.py failed"
            echo "  13 = strict_probe_guard.py failed"
            echo "  14 = ai_content_integrity_guard.py failed"
          fi
          exit $EXIT_CODE
        continue-on-error: true

      - name: Upload smoke test logs
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-logs
          path: |
            smoke_test.log
            ci_guard_report.json
            ci_guard_summary.md
          retention-days: 7
      
      - name: Check database tables
        run: |
          sqlite3 sql_app.db ".tables"
      
      - name: Verify static files
        run: |
          ls -la backend/static/js/app/ | head -20
          ls -la backend/templates/ | head -10
