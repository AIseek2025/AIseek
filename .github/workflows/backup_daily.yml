name: Backup Daily

on:
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * *"

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install boto3
      - name: Run backup and upload
        env:
          BACKUP_NAME: AIseek-Trae-v1
          BACKUPS_DIR: backups
          BACKUP_KEEP_LAST_N: "999999"
          BACKUP_REMOTE_KEEP_LAST_N: ${{ secrets.BACKUP_REMOTE_KEEP_LAST_N }}
          BACKUP_S3_BUCKET: ${{ secrets.BACKUP_S3_BUCKET }}
          BACKUP_S3_PREFIX: ${{ secrets.BACKUP_S3_PREFIX }}
          BACKUP_S3_ENDPOINT_URL: ${{ secrets.BACKUP_S3_ENDPOINT_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          BACKUP_REQUIRE_REMOTE=1 python tools/backup_daily.py
