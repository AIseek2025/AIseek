name: Backup Daily

on:
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * *"

jobs:
  backup:
    runs-on: ubuntu-latest
    # 仅在配置了 S3/OSS 备份密钥时执行（未配置则跳过，不报错）
    if: ${{ secrets.BACKUP_S3_BUCKET != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install oss2
      - name: Run backup and upload
        env:
          BACKUP_NAME: AIseek-Trae-v1
          BACKUPS_DIR: backups
          BACKUP_KEEP_LAST_N: "999999"
          BACKUP_REMOTE_KEEP_LAST_N: ${{ secrets.BACKUP_REMOTE_KEEP_LAST_N }}
          BACKUP_S3_BUCKET: ${{ secrets.BACKUP_S3_BUCKET }}
          BACKUP_S3_PREFIX: ${{ secrets.BACKUP_S3_PREFIX }}
          BACKUP_S3_ENDPOINT_URL: ${{ secrets.BACKUP_S3_ENDPOINT_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          BACKUP_REQUIRE_REMOTE=1 python tools/backup_daily.py
      
      - name: Verify backup upload
        if: always()
        env:
          BACKUP_S3_BUCKET: ${{ secrets.BACKUP_S3_BUCKET }}
          BACKUP_S3_PREFIX: ${{ secrets.BACKUP_S3_PREFIX }}
          BACKUP_S3_ENDPOINT_URL: ${{ secrets.BACKUP_S3_ENDPOINT_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          python tools/backup_verify.py
